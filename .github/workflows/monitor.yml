name: YATA Restock Monitor

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: yata-restock-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    env:
      YATA_URL: https://yata.yt/api/v1/travel/export/
      ITEM_ID: "206"
      COUNTRY: UK
      POLL_SECONDS: "60"
      PREDICTION_HISTORY_WINDOW: "10"
      GITHUB_ACTIONS_DELAY_BUFFER_MINUTES: "3"
      PING_LEAD_MINUTES: "0"
      ENABLE_AIRSTRIP_PINGS: "1"
      ENABLE_BUSINESS_CLASS_PINGS: "0"
      DEFAULT_DEPLETION_RATE_PER_MINUTE: "312.5"
      DEPLETION_RATE_HISTORY_WINDOW: "20"
      MIN_DEPLETION_RATE_SAMPLE_SECONDS: "90"
      DEPLETION_RATE_MIN_MULTIPLIER: "0.25"
      DEPLETION_RATE_MAX_MULTIPLIER: "1.75"
      LOG_LEVEL: INFO
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      STATE_BACKEND: json
      STATE_PATH: ./data/github_actions_state.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor once
        run: python monitor.py --once

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/github_actions_state.json

          if git diff --cached --quiet; then
            echo "No state changes to commit."
          elif python - <<'PY'
          import json
          import subprocess
          import sys
          from pathlib import Path

          STATE_PATH = "data/github_actions_state.json"
          IGNORED_KEYS = {"last_observed_at"}

          def comparable_state(text):
              state = json.loads(text)
              if not isinstance(state, dict):
                  return state
              return {key: value for key, value in state.items() if key not in IGNORED_KEYS}

          current = comparable_state(Path(STATE_PATH).read_text(encoding="utf-8"))
          try:
              previous_text = subprocess.check_output(
                  ["git", "show", f"HEAD:{STATE_PATH}"],
                  stderr=subprocess.DEVNULL,
                  text=True,
              )
              previous = comparable_state(previous_text)
          except subprocess.CalledProcessError:
              previous = None

          sys.exit(0 if previous == current else 1)
          PY
          then
            echo "Only last_observed_at changed; skipping commit."
          else
            git commit -m "Update restock monitor state"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
