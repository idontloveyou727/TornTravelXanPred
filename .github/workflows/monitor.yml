name: YATA Restock Monitor

on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"

permissions:
  contents: write

concurrency:
  group: yata-restock-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    env:
      YATA_URL: https://yata.yt/api/v1/travel/export/
      ITEM_ID: "206"
      COUNTRY: UK
      POLL_SECONDS: "60"
      PREDICTION_HISTORY_WINDOW: "10"
      GITHUB_ACTIONS_DELAY_BUFFER_MINUTES: "5"
      PING_LEAD_MINUTES: "0"
      LOG_LEVEL: INFO
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      STATE_BACKEND: json
      STATE_PATH: ./data/github_actions_state.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor once
        run: python monitor.py --once

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/github_actions_state.json

          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update restock monitor state"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
